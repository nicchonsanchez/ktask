name: Deploy

# Pipeline de deploy KTask:
#   1. wait-ci  — aguarda o workflow CI passar (lint/typecheck/test)
#   2. build    — builda API e Web no runner, taggeia com SHA + latest, e
#                 publica no GitHub Container Registry (ghcr.io). Imutável.
#   3. deploy   — copia compose/Caddyfile pra VM, faz docker login com token
#                 efêmero do workflow, pulla as imagens taggadas com SHA atual,
#                 sobe a stack via compose. Sem build na VM, sem git pull.
#                 VM nunca precisa de credencial GitHub permanente.
#
# Rollback: rerun workflow_dispatch com input image_tag=<sha-anterior>, ou
# setar IMAGE_TAG no infra/prod.env da VM e rodar compose up -d.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag da imagem GHCR pra deployar (default = SHA do commit)'
        required: false
        default: ''

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/ktask-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/ktask-web

jobs:
  wait-ci:
    name: Aguarda CI passar
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: read
      contents: read
    steps:
      # gh CLI nao precisa de working tree — autentica via GH_TOKEN e bate
      # direto na API. Sem checkout = sem dependencia de actions/checkout
      # nem do mirror de actions do GHA.
      - name: Aguarda job "Lint, Typecheck, Test" do workflow CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Pega o check-run mais recente (sort por started_at desc) chamado
          # "Lint, Typecheck, Test". --jq usa first() pra retornar UM unico
          # valor — antes a query estava devolvendo varios e head -1 pegava
          # o primeiro CHAR do JSON multilinha.
          for i in $(seq 1 120); do
            RESULT=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?check_name=Lint%2C+Typecheck%2C+Test" \
              --jq '[.check_runs[]] | sort_by(.started_at) | reverse | .[0] | "\(.status // "missing")|\(.conclusion // "null")"')
            STATUS=$(echo "$RESULT" | cut -d'|' -f1)
            CONCLUSION=$(echo "$RESULT" | cut -d'|' -f2)
            echo "Tentativa $i: status=$STATUS conclusion=$CONCLUSION"
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "CI passou."
                exit 0
              else
                echo "CI falhou (conclusion=$CONCLUSION). Abortando deploy."
                exit 1
              fi
            fi
            sleep 15
          done
          echo "Timeout aguardando CI (30 min)."
          exit 1

  build:
    name: Build & push imagens GHCR
    needs: wait-ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "value=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.ktask.agenciakharis.com.br
            NEXT_PUBLIC_WS_URL=wss://api.ktask.agenciakharis.com.br
            NEXT_PUBLIC_APP_NAME=KTask
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: Deploy Hetzner
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Prepara SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_HOST_KEY }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Envia compose + Caddyfile pra VM
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          # VM precisa ter /opt/ktask/infra/ ja existente. O scp atualiza
          # arquivos sem precisar de git auth na VM.
          ssh -i ~/.ssh/id_ed25519 -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p /opt/ktask/infra"
          scp -i ~/.ssh/id_ed25519 -o UserKnownHostsFile=~/.ssh/known_hosts \
            infra/docker-compose.prod.yml \
            infra/Caddyfile \
            "$DEPLOY_USER@$DEPLOY_HOST:/opt/ktask/infra/"

      - name: Pull imagens + up via compose
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "IMAGE_TAG=$IMAGE_TAG GHCR_TOKEN=$GHCR_TOKEN GHCR_USER=$GHCR_USER bash -s" <<'REMOTE'
          set -euo pipefail
          cd /opt/ktask

          # Trap pra dumpar logs em qualquer falha (compose up, pull, healthcheck timeout).
          # Sem isso, falhas na fase do `compose up` (ex: dependency unhealthy) eram
          # opacas — tinhamos de SSH manual pra ver o que crashou.
          dump_logs_on_error() {
            local code=$?
            if [ $code -ne 0 ]; then
              echo "--- DEPLOY FALHOU (exit=$code), logs dos containers: ---"
              echo "===== ktask-api logs ====="
              docker logs ktask-api --tail 100 2>&1 || true
              echo "===== ktask-web logs ====="
              docker logs ktask-web --tail 100 2>&1 || true
              echo "===== docker ps ====="
              docker ps -a --filter "name=ktask-" || true
              docker logout ghcr.io 2>/dev/null || true
            fi
            return $code
          }
          trap dump_logs_on_error EXIT

          echo "--- docker login ghcr.io (token efemero) ---"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          # Garante que IMAGE_TAG e demais vars vao pro compose
          echo "--- pull imagens (tag=$IMAGE_TAG) ---"
          export IMAGE_TAG
          docker compose -f infra/docker-compose.prod.yml --env-file infra/prod.env pull api web

          echo "--- up -d ---"
          docker compose -f infra/docker-compose.prod.yml --env-file infra/prod.env up -d --remove-orphans

          echo "--- aguardando healthchecks ---"
          for i in $(seq 1 60); do
            api_status=$(docker inspect -f '{{.State.Health.Status}}' ktask-api 2>/dev/null || echo starting)
            web_status=$(docker inspect -f '{{.State.Health.Status}}' ktask-web 2>/dev/null || echo starting)
            echo "[$i] api=$api_status web=$web_status"
            if [ "$api_status" = "healthy" ] && [ "$web_status" = "healthy" ]; then
              echo "--- deploy ok ---"
              # Limpa imagens antigas (mantem so as em uso pelos containers
              # ativos). Sem isso, deploys acumulam ~1.4GB de cache no
              # disco a cada execucao — em semanas estoura o filesystem.
              # Original: GHCR ja guarda todas as versoes pra rollback.
              echo "--- limpando imagens nao-usadas ---"
              docker image prune -af 2>&1 | tail -3 || true
              docker logout ghcr.io || true
              trap - EXIT
              exit 0
            fi
            sleep 5
          done

          echo "--- timeout aguardando healthcheck ---"
          exit 1
          REMOTE

      - name: Smoke test HTTPS
        run: |
          set -e
          api_code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 https://api.ktask.agenciakharis.com.br/healthz)
          web_code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 https://ktask.agenciakharis.com.br/)
          echo "api=$api_code web=$web_code"
          [ "$api_code" = "200" ] && [ "$web_code" = "200" ]
