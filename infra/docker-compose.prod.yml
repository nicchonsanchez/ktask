name: ktask-prod

# Stack de produção do KTask, pensado pra rodar numa VPS única (Hetzner CX23 ou similar).
# Uso:
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/prod.env up -d --build
#
# Requer:
#   infra/prod.env com todas as variáveis de ambiente (ver infra/prod.env.example)
#   DNS A records apontando pra este servidor:
#     ktask.agenciakharis.com.br        -> IP do server
#     api.ktask.agenciakharis.com.br    -> IP do server

services:
  postgres:
    image: postgres:16-alpine
    container_name: ktask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ktask}
      POSTGRES_USER: ${POSTGRES_USER:-ktask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ktask} -d ${POSTGRES_DB:-ktask}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ktask]

  redis:
    image: redis:7-alpine
    container_name: ktask-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [ktask]

  minio:
    image: minio/minio:latest
    container_name: ktask-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Quando reverse-proxy via Caddy, preservar o host publico
      MINIO_SERVER_URL: https://${KTASK_CDN_DOMAIN}
      MINIO_BROWSER_REDIRECT_URL: https://${KTASK_CDN_DOMAIN}/minio/ui
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 5s
      retries: 5
    networks: [ktask]

  # Init: cria bucket + policy anonima de leitura (idempotente)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-ktask}
    entrypoint: >
      sh -c '
      set -e;
      mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
      mc mb --ignore-existing "local/$$S3_BUCKET";
      mc anonymous set download "local/$$S3_BUCKET";
      echo "Bucket $$S3_BUCKET ok";
      '
    restart: 'no'
    networks: [ktask]

  api:
    # Imagem buildada e publicada no GHCR pelo workflow Deploy.
    # IMAGE_TAG vem do prod.env (default 'latest') ou e exportado pelo workflow.
    # Pra rollback manual: editar prod.env com IMAGE_TAG=<sha-anterior> + compose up -d.
    image: ghcr.io/kharis-edu/ktask-api:${IMAGE_TAG:-latest}
    container_name: ktask-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${POSTGRES_USER:-ktask}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ktask}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      CORS_ORIGINS: ${CORS_ORIGINS}
      EMAIL_FROM: ${EMAIL_FROM:-KTask <noreply@agenciakharis.com.br>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EVOLUTION_DEFAULT_URL: ${EVOLUTION_DEFAULT_URL:-}
      EVOLUTION_DEFAULT_API_KEY: ${EVOLUTION_DEFAULT_API_KEY:-}
      EVOLUTION_DEFAULT_INSTANCE: ${EVOLUTION_DEFAULT_INSTANCE:-}
      # Web Push (VAPID). Sem essas chaves PushService nao habilita push e
      # endpoint /push/vapid-public-key retorna 503. Gerar com:
      #   docker exec ktask-api node -e "console.log(require('web-push').generateVAPIDKeys())"
      # Setar VAPID_PUBLIC_KEY/VAPID_PRIVATE_KEY em prod.env + reapply compose.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      # URL pública do frontend — usada em links que saem por WhatsApp
      # (aprovações, notificações). Se não setado vira localhost:3000 e
      # links saem quebrados.
      APP_URL: ${APP_URL:-https://${KTASK_WEB_DOMAIN}}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Emails autorizados a acessar rotas /v1/platform/* (admin global da plataforma).
      # Ver tarefas-md/51-federacao-idp-para-ogma.md.
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-}
      # Storage (MinIO S3-compat). Endpoint interno via rede docker; endpoint publico via Caddy.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: https://${KTASK_CDN_DOMAIN}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-ktask}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1:4000/healthz']
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks: [ktask]

  web:
    # Build args (NEXT_PUBLIC_*) sao definidos no momento do build no
    # GHA runner (ver .github/workflows/deploy.yml). Aqui so o pull.
    image: ghcr.io/kharis-edu/ktask-web:${IMAGE_TAG:-latest}
    container_name: ktask-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1:3000/']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks: [ktask]

  caddy:
    image: caddy:2-alpine
    container_name: ktask-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    depends_on:
      - web
      - api
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      KTASK_WEB_DOMAIN: ${KTASK_WEB_DOMAIN}
      KTASK_API_DOMAIN: ${KTASK_API_DOMAIN}
      KTASK_CDN_DOMAIN: ${KTASK_CDN_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks: [ktask]

networks:
  ktask:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddy_data:
  caddy_config:
